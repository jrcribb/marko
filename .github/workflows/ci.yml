name: CI

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main, v3, v4]

concurrency:
  group: "${{ github.workflow }}-${{ github.event_name == 'pull_request_target' && github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Use node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run @ci:build
      - name: Lint Code
        run: pnpm run @ci:lint
  test:
    runs-on: ubuntu-latest
    name: "test: node@${{ matrix.node }}"
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24, 26]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Use node@${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Coverage collection + the c8 report add ~45% to the job (the report
      # alone is ~1 min of single-threaded remapping), so only the newest node
      # version pays for it — coverage is version-independent for this suite.
      - name: Run tests
        if: ${{ matrix.node != 26 }}
        run: pnpm run @ci:test:fast
      - name: Run tests with coverage
        if: ${{ matrix.node == 26 }}
        run: pnpm run @ci:test
      - name: Report code coverage
        if: ${{ matrix.node == 26 }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
  release:
    runs-on: ubuntu-latest
    needs: [build, test]
    if: ${{ github.repository_owner == 'marko-js' && github.event_name == 'push' }}
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Release
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run @ci:version
          publish: pnpm run @ci:release
          commit: "[ci] release"
          title: "[ci] release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
